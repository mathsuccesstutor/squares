<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect Squares Practice (1–15)</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f5f7fb;
    margin:0;
    padding:40px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
    color:#333;
}

#question{
    font-size:64px;
    margin:30px 0;
    min-height:80px;
}

input{
    font-size:32px;
    width:180px;
    text-align:center;
    padding:10px;
}

button{
    font-size:22px;
    padding:12px 24px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#4f7cff;
    color:white;
}

#feedback{
    font-size:28px;
    margin-top:20px;
    min-height:40px;
    font-weight:bold;
}

.correct{
    background:#c8ffd1 !important;
}

.incorrect{
    background:#ffd2d2 !important;
}

#stats{
    margin-top:20px;
    font-size:22px;
}

.hidden{
    display:none;
}

#timer{
    font-size:30px;
    color:#444;
    margin-bottom:20px;
}
</style>
</head>
<body>

<div class="container">

<h1>Perfect Squares 1–15</h1>

<div id="startScreen">
    <p>Type the square and press Enter.</p>
    <p>You have 2 minutes.</p>
    <button onclick="startGame()">Start</button>
</div>

<div id="gameScreen" class="hidden">
    <div id="timer">2:00</div>
    <div id="question"></div>

    <input id="answerBox" type="number" autocomplete="off">

    <div id="feedback"></div>

    <div id="stats">
        Score: <span id="score">0</span>
    </div>
</div>

<div id="endScreen" class="hidden">
    <h2>Time's Up!</h2>
    <p><strong>Final Score:</strong> <span id="finalScore"></span></p>
    <p><strong>Missed:</strong> <span id="missed"></span></p>
    <button onclick="location.reload()">Play Again</button>
</div>

</div>

<script>
const numbers = [];
for(let i=1;i<=15;i++){
    numbers.push(i);
}

let currentNumber;
let score = 0;
let missed = 0;
let timer;
let secondsRemaining = 120;

const questionEl = document.getElementById("question");
const answerBox = document.getElementById("answerBox");
const feedbackEl = document.getElementById("feedback");

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function playCorrectSound(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = 700;
    osc.type = "sine";

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.2);

    osc.start();
    osc.stop(ctx.currentTime+0.2);
}

function playIncorrectSound(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = 220;
    osc.type = "sawtooth";

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.3);

    osc.start();
    osc.stop(ctx.currentTime+0.3);
}

function nextQuestion(){
    currentNumber = numbers[Math.floor(Math.random()*numbers.length)];

    questionEl.innerHTML = `${currentNumber}<sup>2</sup>`;
    answerBox.value = "";
    answerBox.focus();
}

function showFeedback(correct){
    document.body.classList.remove("correct","incorrect");

    if(correct){
        feedbackEl.textContent = "✓ Correct!";
        feedbackEl.style.color = "green";
        document.body.classList.add("correct");
        playCorrectSound();
    }else{
        feedbackEl.textContent = `✗ Wrong! ${currentNumber}² = ${currentNumber*currentNumber}`;
        feedbackEl.style.color = "red";
        document.body.classList.add("incorrect");
        playIncorrectSound();
    }

    setTimeout(()=>{
        feedbackEl.textContent = "";
        document.body.classList.remove("correct","incorrect");
        nextQuestion();
    },900);
}

answerBox.addEventListener("keydown", function(e){

    if(e.key !== "Enter") return;

    const answer = parseInt(answerBox.value);

    if(answer === currentNumber*currentNumber){
        score++;
        document.getElementById("score").textContent = score;
        showFeedback(true);
    }else{
        missed++;
        showFeedback(false);
    }
});

function updateTimer(){
    const mins = Math.floor(secondsRemaining/60);
    const secs = secondsRemaining%60;

    document.getElementById("timer").textContent =
        `${mins}:${secs.toString().padStart(2,"0")}`;

    if(secondsRemaining <= 0){
        endGame();
        return;
    }

    secondsRemaining--;
}

function startGame(){

    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("gameScreen").classList.remove("hidden");

    shuffle(numbers);

    nextQuestion();

    updateTimer();

    timer = setInterval(updateTimer,1000);
}

function endGame(){

    clearInterval(timer);

    document.getElementById("gameScreen").classList.add("hidden");
    document.getElementById("endScreen").classList.remove("hidden");

    document.getElementById("finalScore").textContent = score;
    document.getElementById("missed").textContent = missed;
}
</script>

</body>
</html>
